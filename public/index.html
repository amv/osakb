        body: JSON.stringify({ iv: ivB, ct: ctB, mac: mac })
      });
    }).then(function (res) {
      if (res.status === 401 && !isRetry) {
        // nonce expired or server restarted — get a fresh nonce and retry once
        nonce = null;
        return sendEncrypted(ops, true);
      }
      return res.json().catch(function () { return {}; }).then(function (data) {
        if (!res.ok) setStatus(data.error || ('HTTP ' + res.status), 'err');
        else setStatus('sent', 'ok');
      });
    }).catch(function () { setStatus('offline', 'err'); });
  }

  // Serialize sends so counters always arrive in increasing order (the server
  // rejects out-of-order counters as replays).
  var sendQueue = Promise.resolve();
  function flushBatch(ops) {
    sendQueue = sendQueue.then(function () {
      return sendEncrypted(ops, false);
    }, function () {});
    return sendQueue;
  }

  // Quantize sends to a fixed time grid: buffer ops and flush on a timer instead
  // of firing the instant a key is pressed. This batches bursts into one request,
  // coalesces mouse-move/scroll deltas (so a drag is a few summed moves, not
  // dozens of messages), and blurs precise inter-keystroke timing (a known side
  // channel). Light touch — true timing privacy would need constant-rate cover.
  var FLUSH_MS = 50;
  var opQueue = [];
  var pendMove = { dx: 0, dy: 0 };
  var pendScroll = { dy: 0 };
  var flushTimer = null;

  function scheduleFlush() {
    if (!flushTimer) flushTimer = setTimeout(doFlush, FLUSH_MS);
  }
  function doFlush() {
    flushTimer = null;
    var batch = [];
    if (pendMove.dx || pendMove.dy) {
      batch.push({ t: 'm', k: 'mv', dx: Math.round(pendMove.dx), dy: Math.round(pendMove.dy) });
      pendMove.dx = 0; pendMove.dy = 0;
    }
    if (pendScroll.dy) {
      batch.push({ t: 'm', k: 'sc', dy: Math.round(pendScroll.dy) });
      pendScroll.dy = 0;
    }
    if (opQueue.length) { batch = batch.concat(opQueue); opQueue = []; }
    if (batch.length) flushBatch(batch);
  }

  function haveSecret() {
    if (secret) return true;
    setStatus('no secret', 'err');
    showSecretPrompt();
    return false;
  }

  // Discrete ops (keys, clicks).
  function sendOp(op) {
    if (!haveSecret()) return;
    opQueue.push(op);
    scheduleFlush();
  }
  // Coalesced relative mouse movement / scrolling.
  function moveMouse(dx, dy) {
    if (!secret) return;
    pendMove.dx += dx; pendMove.dy += dy;
    scheduleFlush();
  }
  function scrollMouse(dy) {
    if (!secret) return;
    pendScroll.dy += dy;
    scheduleFlush();
  }
  function clickMouse(btn) { sendOp({ t: 'm', k: 'cl', btn: btn }); }
  // Press-and-hold buttons: button-down on press, button-up on release. While a
  // button is held the server turns trackpad moves into drags, so press a button,
  // drag on the trackpad with another finger, release to drop.
  function downMouse(btn) { sendOp({ t: 'm', k: 'dn', btn: btn }); }
  function upMouse(btn) { sendOp({ t: 'm', k: 'up', btn: btn }); }

  // ---- manual secret entry (fallback when no QR/hash and nothing stored) ----
  var secretPromptShown = false;
  function showSecretPrompt() {
    if (secretPromptShown) return;
    secretPromptShown = true;
    var ov = document.createElement('div');
    ov.className = 'overlay';
    ov.innerHTML =
      '<div class="box">' +
      '<h2>Enter osakb secret</h2>' +
      '<p>Scan the QR the server printed, or paste the secret (or the full URL) below.</p>' +
      '<input id="secret-input" type="text" autocomplete="off" autocapitalize="off" ' +
      'autocorrect="off" spellcheck="false" placeholder="secret or http://…/#secret" />' +
      '<button id="secret-save" type="button">Save</button>' +
      '</div>';
    document.body.appendChild(ov);
    var input = ov.querySelector('#secret-input');
    function save() {
      var v = input.value.trim();
      if (v.indexOf('#') >= 0) v = v.slice(v.lastIndexOf('#') + 1);
      v = v.trim();
      if (!v) return;
      try { localStorage.setItem(SECRET_KEY, v); } catch (e) {}
      secret = v; nonce = null; deriveKeys();
      document.body.removeChild(ov);
      secretPromptShown = false;
      setStatus('secret saved', 'ok');
      fetchNonce().catch(function () {});
    }
    ov.querySelector('#secret-save').addEventListener('click', save);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') save(); });
    input.focus();
  }

  // ---- latching modifiers (held until tapped again) ----
  var mods = { command: false, option: false, control: false, shift: false };
  function activeMods() {
    return Object.keys(mods).filter(function (m) { return mods[m]; });
  }
  function hasCase(ch) {
    return ch.toLowerCase() !== ch.toUpperCase();
  }
  function refreshMods() {
    var modKeys = document.querySelectorAll('.key.mod');
    for (var i = 0; i < modKeys.length; i++) {
      modKeys[i].classList.toggle('on', !!mods[modKeys[i].dataset.mod]);
    }
    var charKeys = document.querySelectorAll('.key[data-char]');
    for (var j = 0; j < charKeys.length; j++) {
      var ch = charKeys[j].dataset.char;
      if (hasCase(ch)) charKeys[j].textContent = mods.shift ? ch.toUpperCase() : ch.toLowerCase();
    }
  }

  function sendKey_(body) { sendOp({ t: 'k', b: body }); }

  function sendChar(ch) {
    var m = activeMods();
    var others = m.filter(function (x) { return x !== 'shift'; });
    if (others.length > 0) {
      sendKey_({ text: hasCase(ch) ? ch.toLowerCase() : ch, modifiers: m });
    } else if (mods.shift && hasCase(ch)) {
      sendKey_({ text: ch.toUpperCase() });
    } else {
      sendKey_({ text: ch });
    }
  }

  function sendKey(name) {
    var m = activeMods();
    sendKey_(m.length ? { key: name, modifiers: m } : { key: name });
  }

  function flash(btn) {
    btn.classList.add('flash');
    setTimeout(function () { btn.classList.remove('flash'); }, 120);
  }

  // Reliable tap handling: fire on touchstart for instant response on iOS,
  // and suppress the synthesized click so it doesn't double-fire. Falls back
  // to click on non-touch devices.
  function onTap(el, fn) {
    var usedTouch = false;
    el.addEventListener('touchstart', function (e) {
      usedTouch = true;
      e.preventDefault();
      fn();
    }, { passive: false });
    el.addEventListener('click', function () {
      if (usedTouch) { usedTouch = false; return; }
      fn();
    });
  }

  // Press-and-hold: `down` on press, `up` on release (or cancel). Tracks a single
  // active press so touch + synthesized mouse events don't double-fire, and a
  // missed touchend (touchcancel, or releasing off-element on desktop) still ups.
  function onHold(el, down, up) {
    var active = false;
    function start(e) { if (e) e.preventDefault(); if (active) return; active = true; down(); }
    function end(e) { if (e) e.preventDefault(); if (!active) return; active = false; up(); }
    el.addEventListener('touchstart', start, { passive: false });
    el.addEventListener('touchend', end, { passive: false });
    el.addEventListener('touchcancel', end, { passive: false });
    el.addEventListener('mousedown', start);
    window.addEventListener('mouseup', function () { end(); });
  }

  // ---- on-screen special keys (modifiers, navigation, editing) ----
  // The letters/symbols themselves come from the phone's NATIVE keyboard (see the
  // capture field below); this bar only adds the keys a phone keyboard lacks.
  // Items: { label, mod } modifier toggle (latches), or { label, key } special
  // key (see keys.js), plus optional { cls } CSS classes.
  // Laid out on a 6-column grid (c = column 1-6, r = row). Left half (c1-3) is
  // esc/tab/backspace then the latching modifiers; right half (c4-6) mirrors the
  // Mac nav cluster above the arrows (🌐/Home/PgUp · ⌦/End/PgDn) with the arrow
  // keys as triangles in their inverted-T below.
  var KB_GRID = [
    { label:'⎋', key:'escape',       cls:'special', c:1, r:1 },
    { label:'⇥', key:'tab',          cls:'special', c:2, r:1 },
    { label:'⌫', key:'backspace',    cls:'special', c:3, r:1 },
    { label:'⌘', mod:'command',      cls:'mod',     c:1, r:2 },
    { label:'⌥', mod:'option',       cls:'mod',     c:2, r:2 },
    { label:'⌃', mod:'control',      cls:'mod',     c:3, r:2 },
    { label:'⇧', mod:'shift',        cls:'mod',     c:1, r:3 },

    { label:'🌐', key:'globe',        cls:'special', c:4, r:1 },
    { label:'Home', key:'home',      cls:'special', c:5, r:1 },
    { label:'PgUp', key:'pageup',    cls:'special', c:6, r:1 },
    { label:'⌦', key:'forwarddelete', cls:'special', c:4, r:2 },
    { label:'End', key:'end',        cls:'special', c:5, r:2 },
    { label:'PgDn', key:'pagedown',  cls:'special', c:6, r:2 },

    { label:'▲', key:'up',    cls:'special arrow', c:5, r:3 },
    { label:'◀', key:'left',  cls:'special arrow', c:4, r:4 },
    { label:'▼', key:'down',  cls:'special arrow', c:5, r:4 },
    { label:'▶', key:'right', cls:'special arrow', c:6, r:4 },
  ];

  function buildKey(item) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'key ' + (item.cls || '');
    btn.textContent = item.label;
    if (item.c) btn.style.gridColumn = item.c;
    if (item.r) btn.style.gridRow = item.r;
    if (item.mod) {
      btn.dataset.mod = item.mod;
      onTap(btn, function () { mods[item.mod] = !mods[item.mod]; refreshMods(); });
    } else if (item.key) {
      onTap(btn, function () { flash(btn); sendKey(item.key); });
    }
    return btn;
  }

  function buildKbSpecial() {
    var host = document.getElementById('kb-special');
    host.innerHTML = '';
    for (var i = 0; i < KB_GRID.length; i++) host.appendChild(buildKey(KB_GRID[i]));
    // Keep taps inside the bar from stealing focus from the capture field (which
    // would dismiss the native keyboard). On touch, onTap already preventDefaults
    // touchstart; this covers desktop mouse clicks.
    host.addEventListener('mousedown', function (e) { e.preventDefault(); });
    refreshMods();
  }

  // ---- native-keyboard capture ----
  // Rather than draw our own letter grid, we focus a text field so the phone's own
  // keyboard pops up, and translate its edits into keystrokes. iOS soft keyboards
  // don't fire reliable keydown events, so we read `beforeinput` (inputType + data)
  // and cancel the edit so nothing accumulates in the field.
  //
  // The field is seeded with a few spaces and the caret pinned to the end, so a
  // Backspace always has something to "delete" and therefore always emits a
  // deleteContentBackward we can forward (an empty field emits nothing).
  var capture = document.getElementById('kb-capture');
  var CAPTURE_SEED = '    ';

  function seedCapture() {
    capture.value = CAPTURE_SEED;
    try { capture.setSelectionRange(CAPTURE_SEED.length, CAPTURE_SEED.length); } catch (e) {}
  }

  // Forward typed text, honouring latched non-shift modifiers (so ⌘ then "c"
  // becomes ⌘C). Native shift is already baked into the character's case, so with
  // no modifier held we send the data verbatim — whole words from swipe-typing and
  // predictive suggestions come through as one insertText and just work.
  function typeText(data) {
    var others = activeMods().filter(function (x) { return x !== 'shift'; });
    if (others.length) {
      for (var i = 0; i < data.length; i++) sendChar(data.charAt(i));
    } else {
      sendKey_({ text: data });
    }
  }

  // A special key plus any latched modifiers, plus extra modifiers (e.g. ⌥ for the
  // native "delete word" gesture -> option+backspace).
  function sendKeyExtra(name, extra) {
    var m = activeMods();
    for (var i = 0; i < extra.length; i++) if (m.indexOf(extra[i]) < 0) m.push(extra[i]);
    sendKey_(m.length ? { key: name, modifiers: m } : { key: name });
  }

  capture.addEventListener('focus', seedCapture);
  capture.addEventListener('blur', function () { capture.value = ''; });

  capture.addEventListener('beforeinput', function (e) {
    var t = e.inputType || '';
    if (t.indexOf('delete') === 0) {
      if (t === 'deleteWordBackward') sendKeyExtra('backspace', ['option']);
      else if (t === 'deleteWordForward') sendKeyExtra('forwarddelete', ['option']);
      else if (t === 'deleteContentForward') sendKey('forwarddelete');
      else sendKey('backspace');
      e.preventDefault();
    } else if (t === 'insertLineBreak' || t === 'insertParagraph') {
      sendKey('return');
      e.preventDefault();
    } else if (e.data != null) {
      typeText(e.data);
      e.preventDefault();
    }
    // else: a dataless event (e.g. composition start) — let it ride; the input
    // handler below re-seeds afterwards.
  });

  // Safety net: if any edit slipped past preventDefault, restore the seed so the
  // field never drifts (which would break the Backspace trick).
  capture.addEventListener('input', function () {
    if (document.activeElement === capture && capture.value !== CAPTURE_SEED) seedCapture();
  });

  // Pin the caret to the end while the field is focused, so a Backspace always has
  // a seed character in front of it even if the user taps into the field.
  document.addEventListener('selectionchange', function () {
    if (document.activeElement === capture && capture.selectionStart !== CAPTURE_SEED.length) {
      try { capture.setSelectionRange(CAPTURE_SEED.length, CAPTURE_SEED.length); } catch (e) {}
    }
  });

  // ---- mouse tab: drag to move, tap to click, side strip to scroll ----
  var sens = document.getElementById('sens');
  var sensitivity = Number(sens.value);
  sens.addEventListener('input', function () { sensitivity = Number(sens.value); });

  var SCROLL_SPEED = 1.2;
  // Velocity-based acceleration for the scroll strip: a fast flick scrolls more
  // than a slow drag over the same distance. The multiplier is 1 + GAIN*|v| (v in
  // px/ms), capped, so slow drags stay precise (~1x) and quick flicks ramp up.
  var SCROLL_ACCEL_GAIN = 1.8, SCROLL_ACCEL_MAX = 7;
  var TAP_MOVE_PX = 8, TAP_MS = 250; // movement/time thresholds for tap-to-click

  var trackpad = document.getElementById('trackpad');
  var tLastX = 0, tLastY = 0, tStartX = 0, tStartY = 0, tStartT = 0, tMoved = 0;
  trackpad.addEventListener('touchstart', function (e) {
    e.preventDefault();
    // targetTouches = touches that began on the trackpad, so holding a click
    // button with another finger doesn't hijack the movement tracking.
    var t = e.targetTouches[0] || e.touches[0];
    tLastX = tStartX = t.clientX; tLastY = tStartY = t.clientY;
    tStartT = Date.now(); tMoved = 0;
    trackpad.classList.add('active');
  }, { passive: false });
  trackpad.addEventListener('touchmove', function (e) {
    e.preventDefault();
    var t = e.targetTouches[0] || e.touches[0];
    var dx = t.clientX - tLastX, dy = t.clientY - tLastY;
    tLastX = t.clientX; tLastY = t.clientY;
    tMoved += Math.abs(dx) + Math.abs(dy);
    moveMouse(dx * sensitivity, dy * sensitivity);
  }, { passive: false });
  trackpad.addEventListener('touchend', function (e) {
    e.preventDefault();
    trackpad.classList.remove('active');
    // Quick tap with little movement = left click.
    if (tMoved < TAP_MOVE_PX && (Date.now() - tStartT) < TAP_MS) clickMouse('l');
  }, { passive: false });

  var strip = document.getElementById('scrollstrip');
  var sLastY = 0, sLastT = 0;
  strip.addEventListener('touchstart', function (e) {
    e.preventDefault();
    sLastY = e.touches[0].clientY;
    sLastT = Date.now();
    strip.classList.add('active');
  }, { passive: false });
  strip.addEventListener('touchmove', function (e) {
    e.preventDefault();
    var now = Date.now();
    var y = e.touches[0].clientY;
    var dy = y - sLastY; sLastY = y;
    var dt = now - sLastT; sLastT = now;
    // Swipe speed scales the throw: faster finger -> larger accel multiplier.
    var v = dt > 0 ? Math.abs(dy) / dt : 0; // px per ms
    var accel = 1 + Math.min(v * SCROLL_ACCEL_GAIN, SCROLL_ACCEL_MAX);
    // Drag down -> scroll content down (wheel-down is negative for CG).
    scrollMouse(-dy * SCROLL_SPEED * accel);
  }, { passive: false });
  strip.addEventListener('touchend', function (e) {
    e.preventDefault();
    strip.classList.remove('active');
  }, { passive: false });

  onHold(document.getElementById('btn-left'),
    function () { downMouse('l'); }, function () { upMouse('l'); });
  onHold(document.getElementById('btn-right'),
    function () { downMouse('r'); }, function () { upMouse('r'); });

  // ---- tabs ----
  var tabs = {
    mouse: { btn: document.getElementById('tab-mouse'), view: document.getElementById('view-mouse') },
    kb: { btn: document.getElementById('tab-kb'), view: document.getElementById('view-kb') }
  };
  function selectTab(name) {
    for (var k in tabs) {
      tabs[k].btn.classList.toggle('active', k === name);
      tabs[k].view.classList.toggle('hidden', k !== name);
    }
    // Raise the native keyboard when entering the tab (best-effort — iOS may
    // require the user to tap the field), and dismiss it when leaving.
    if (name === 'kb') { try { capture.focus(); } catch (e) {} }
    else { try { capture.blur(); } catch (e) {} }
  }
  onTap(tabs.mouse.btn, function () { selectTab('mouse'); });
  onTap(tabs.kb.btn, function () { selectTab('kb'); });

  buildKbSpecial(); // build the special-keys bar now (Mouse is the default tab)
  if (secret) {
    setStatus('ready');
    fetchNonce().catch(function () {}); // warm up a nonce
  } else {
    setStatus('no secret', 'err');
    showSecretPrompt();
  }
})();
</script>
</body>
</html>
